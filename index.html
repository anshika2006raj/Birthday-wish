<!DOCTYPE html>
<html>
<head>
  <title>Luxury Birthday</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()">🌙 Toggle Theme</button>

<section class="birthday-section">
  <div class="birthday-card">
    <h1 class="title">🎉 Happy Birthday 🎂</h1>
    <p class="message">
      May your life be filled with happiness, success,
      laughter and endless love ✨  
      You deserve the most beautiful moments today and always 💖
    </p>
  </div>
</section>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>


<!-- Hearts -->
<div class="hearts"></div>

<div class="intro">
  <h1>✨ A Special Moment Awaits ✨</h1>
</div>


<!-- Fireworks Script -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
